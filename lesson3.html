<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;

        }
        h1 {

        }

        }
        .reading-item .speaker-btn { 
            position: absolute;

            top: 50%;

            color: white;

        }
        .reading-item .speaker-btn:active { background: #5a6fd6; }
        .quiz-container {

            padding: 25px 15px; 
            border-radius: 16px; 
            text-align: center; 
            min-height: 280px; 
        }

        }

        }
        .quiz-input { 
            width: 100%; 
            max-width: 400px;

            border: 2px solid #ddd; 
            border-radius: 12px; 
            font-size: 1.1rem; 
            text-align: center;

        }
        .quiz-input.correct { border-color: #28a745; background: #d4edda; }
        .quiz-input.wrong { border-color: #dc3545; background: #f8d7da; }
        .quiz-btn { 
            background: #667eea; 
            color: white; 
            border: none; 
            padding: 14px 35px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 1.05rem; 
            margin: 10px;

        }
        .quiz-btn:active { background: #5a6fd6; }
        .quiz-btn.hint-btn { background: #ffc107; color: #333; }
        .quiz-btn.hint-btn:active { background: #e5ac00; }
        .quiz-feedback { 
            margin-top: 15px; 
            padding: 15px; 
            border-radius: 12px; 
            font-size: 1.05em; 
            display: none; 
        }
        .quiz-feedback.show { display: block; }
        .quiz-feedback.correct { background: #d4edda; color: #155724; }
        .quiz-feedback.wrong { background: #f8d7da; color: #721c24; }
        .mode-toggle { margin-bottom: 20px; }
        .mode-toggle button { 
            padding: 12px 24px; 
            margin: 0 5px; 
            border: 2px solid #667eea; 
            background: white;

        }
        .mode-toggle button.active { background: #667eea; color: white; }
        .completion-message { text-align: center; padding: 30px 15px; }
        .completion-message h2 { color: #28a745; margin-bottom: 15px; font-size: clamp(1.3rem, 5vw, 1.8rem); }
        .stars { font-size: clamp(2rem, 8vw, 3em); margin: 15px 0; }

        .answer-display { 
            font-size: clamp(1.1rem, 4vw, 1.3em);

            font-weight: bold; 
            margin: 15px 0; 
            padding: 15px;

            border-radius: 10px; 
        }
        .hint-text { color: #888; font-size: 0.95em; margin: 10px 0; display: none; }
        .hint-text.show { display: block; }
        .option-group { 
            display: flex; 
            gap: 10px; 
            flex-wrap: wrap; 
            justify-content: center; 
            margin-top: 15px; 
        }
        .option-btn { 
            padding: 15px 25px; 
            border: 2px solid #ddd;

            border-radius: 12px; 
            cursor: pointer; 
            font-size: clamp(1rem, 3.5vw, 1.15em);

        .option-btn:active { border-color: #667eea; background: #f0f4ff; }
        .option-btn.selected { background: #667eea; color: white; border-color: #667eea; }
        h2 { 
            color: #667eea; 
            margin: 25px 0 12px 0; 
            padding-bottom: 8px; 
            border-bottom: 2px solid #eee; 
            font-size: clamp(1.1rem, 4vw, 1.4rem);
        }
        @media (min-width: 768px) {
            body { padding: 20px; }
            .container { padding: 40px; border-radius: 20px; }
            .header { margin-bottom: 30px; padding-bottom: 20px; }
            .tabs { margin-bottom: 30px; flex-wrap: wrap; }
            .quiz-container { padding: 40px; }
            .quiz-question { margin: 30px 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Lesson 3</h1>
            <a href="index.html" class="back-btn">← 返回</a>
        </div>
        <div class="tabs">
            <button class="tab active" onclick="showTab('grammar')">📖 语法</button>
            <button class="tab" onclick="showTab('vocab')">📝 词汇</button>
            <button class="tab" onclick="showTab('reading')">📄 阅读</button>
            <button class="tab" onclick="showTab('dictation')">✍️ 默写</button>
            <button class="tab" onclick="showTab('fillblank')">🔤 填空</button>
            <button class="tab" onclick="showTab('translate')">🌐 翻译</button>
            <button class="tab" onclick="showTab('pronoun')">👤 代词</button>
        </div>
        <div id="grammar" class="tab-content active">
            <h2>1. Can 的用法</h2>
            <table class="grammar-table">
                <tr><th>用法</th><th>例句</th><th>中文</th></tr>
                <tr><td>表达能力</td><td>I can drive a car.</td><td>我会开车。</td></tr>
                <tr><td>表达能力（否定）</td><td>My sister cannot drive.</td><td>我妹妹不会开车。</td></tr>
                <tr><td>请求许可</td><td>Can I sit here?</td><td>我可以坐这里吗？</td></tr>
                <tr><td>请求帮助</td><td>Can you help me?</td><td>你能帮我吗？</td></tr>
            </table>
            <h2>2. Can 例句</h2>
            <div id="can-examples"></div>
        </div>
        <div id="vocab" class="tab-content">
            <h2>活动和场所</h2>
            <div class="vocab-grid" id="vocab-activities"></div>
            <h2>更多词汇</h2>
            <div class="vocab-grid" id="vocab-more"></div>
        </div>
        <div id="reading" class="tab-content">
            <h2>阅读材料</h2>
            <div id="reading-sentences"></div>
        </div>
        <div id="dictation" class="tab-content">
            <div class="mode-toggle">
                <button class="active" onclick="setDictationMode('cn2en')">中译英</button>
                <button onclick="setDictationMode('en2cn')">英译中</button>
            </div>
            <div class="quiz-container" id="dictation-quiz">
                <div class="completion-message"><h2>🎯 单词默写</h2><p style="color:#666;margin:20px 0;">选择上方模式开始练习</p></div>
            </div>
        </div>
        <div id="fillblank" class="tab-content">
            <div class="quiz-container" id="fillblank-quiz">
                <div class="completion-message"><h2>📝 填空练习</h2><button class="quiz-btn" onclick="startFillBlank()">开始练习</button></div>
            </div>
        </div>
        <div id="translate" class="tab-content">
            <div class="quiz-container" id="translate-quiz">
                <div class="completion-message"><h2>🌐 翻译练习</h2><button class="quiz-btn" onclick="startTranslate()">开始练习</button></div>
            </div>
        </div>
        <div id="pronoun" class="tab-content">
            <div class="quiz-container" id="pronoun-quiz">
                <div class="completion-message"><h2>👤 代词练习</h2><button class="quiz-btn" onclick="startPronoun()">开始练习</button></div>
            </div>
        </div>
    </div>
    <script>
        const WrongAnswersManager = {
            STORAGE_KEY: 'english_learning_wrong_answers_l3',
            getAll() { const data = localStorage.getItem(this.STORAGE_KEY); return data ? JSON.parse(data) : {}; },
            save(wrongItem) {
                const key = JSON.stringify({q: wrongItem.q || wrongItem.cn || wrongItem.en, type: wrongItem.type});
                const all = this.getAll();
                if (!all[key]) { all[key] = { ...wrongItem, correctCount: 0, lastWrong: Date.now() }; }
                localStorage.setItem(this.STORAGE_KEY, JSON.stringify(all));
            },
            recordCorrect(wrongItem) {
                const key = JSON.stringify({q: wrongItem.q || wrongItem.cn || wrongItem.en, type: wrongItem.type});
                const all = this.getAll();
                if (all[key]) { all[key].correctCount++; if (all[key].correctCount >= 5) { delete all[key]; } localStorage.setItem(this.STORAGE_KEY, JSON.stringify(all)); }
            }
        };

        const lessonData = {
            activities: [
                {en: 'cinema', cn: '电影院'}, {en: 'beach', cn: '海滩'},
                {en: 'play tennis', cn: '打网球'}, {en: 'play the piano', cn: '弹钢琴'},
                {en: 'play computer games', cn: '玩电脑游戏'}, {en: 'do sport', cn: '做运动'},
                {en: 'walk', cn: '走路'}, {en: 'swim', cn: '游泳'},
                {en: 'policeman', cn: '警察'}, {en: 'birthday', cn: '生日'},
                {en: 'angry', cn: '生气的'}, {en: 'restaurant', cn: '餐厅'},
                {en: 'bar', cn: '酒吧'}, {en: 'give', cn: '给'},
                {en: 'call', cn: '打电话'}, {en: 'draw', cn: '画画'}, {en: 'language', cn: '语言'}
            ],
            moreWords: [
                {en: 'smoke cigarettes', cn: '抽烟'}, {en: 'change money', cn: '换钱'},
                {en: 'use the Internet', cn: '上网'}, {en: 'take photos', cn: '拍照'},
                {en: 'drive', cn: '开车'}, {en: 'pay by card', cn: '刷卡'},
                {en: 'pay by cash', cn: '付现金'}, {en: 'park', cn: '停车'},
                {en: 'come', cn: '来'}, {en: 'see', cn: '看见'},
                {en: 'hear', cn: '听见'}, {en: 'help', cn: '帮助'},
                {en: 'sit', cn: '坐'}, {en: 'tonight', cn: '今晚'},
                {en: 'write', cn: '写'}, {en: 'museum', cn: '博物馆'}
            ],
            canExamples: [
                'I can drive a car, but my sister cannot drive.',
                'Can you give me a pen, please? Thank you!',
                'Excuse me, can I sit here? Yes, sure!',
                'Teacher, can we go home now? No, you cannot.',
                'You can eat pasta in Italian restaurant.',
                'Can we go to the cinema tonight? No, I am sorry, I cannot.',
                'Can you have a shower at the gym? Yes, of course, I can.',
                'I do not drink coffee in the evening, because I cannot sleep at night.',
                'Can you walk to your office? No, I cannot.',
                'Excuse me, can I smoke here? No, you cannot.',
                'Where can I change my money? I do not know.',
                'Can you come with me after work? Sorry, I cannot.'
            ],
            reading: [
                'Mom, can we play computer games now? Not now. You can play after dinner.',
                'Can you write your name here, please? Sorry, I do not have a pen.',
                'Excuse me, can you take our photo, please? Thank you very much!',
                'You cannot park in the shopping center! It is really expensive.',
                'Hi, Matt! Hi! Who is that? It is me, Ellie!',
                'Can you come to dinner on Friday? On Friday? Oh, I am really sorry. I cannot come.'
            ],
            fillBlank: [
                {q: 'I ___ drive a car.', a: 'can', hint: '表达能力用 can'}, {q: 'My sister ___ not drive.', a: 'can', hint: '否定用 cannot'},
                {q: '___ you give me a pen?', a: 'Can', hint: '请求帮助用 Can'}, {q: '___ I sit here?', a: 'Can', hint: '请求许可用 Can'},
                {q: 'No, you ___.', a: 'cannot', hint: '否定回答'}, {q: 'Where ___ I park?', a: 'can', hint: '询问可能性'}
            ],
            translations: [
                {cn: '你不可以在医院用手机。', en: 'You cannot use mobile phone in hospital.'},
                {cn: '不好意思，我不知道。', en: 'Sorry, I do not know.'},
                {cn: '你为什么不能开你的车？', en: 'Why cannot you drive your car?'},
                {cn: '因为我今天早上喝了很多红酒。', en: 'Because I drank a lot of red wine this morning.'},
                {cn: '他们的同事会踢足球吗？', en: 'Can their colleague play football?'},
                {cn: '他生病了，所以今天不能来踢足球。', en: 'He is sick, so he cannot play football today.'},
                {cn: '你经常给父母打电话？', en: 'Do you often call your parents?'},
                {cn: '不常，因为他们老了。', en: 'Not often, because they are old.'},
                {cn: '嗨！你今晚忙吗？', en: 'Hi! Are you busy tonight?'},
                {cn: '不忙。怎么了？', en: 'No. What is up?'},
                {cn: '你可以跟我一起去电影院吗？', en: 'Can you go to the cinema with me?'},
                {cn: '我不确定。', en: 'I am not sure.'}
            ],
            pronouns: [
                {q: 'John, do you like _____? Yes, of course! I like you!', options: ['me', 'you', 'him'], a: 'me'},
                {q: 'Her English is not very good. I do not understand _____.', options: ['she', 'her', 'hers'], a: 'her'},
                {q: 'Dad! Look at _____! I am on the table!', options: ['I', 'me', 'my'], a: 'me'},
                {q: 'My coffee is cold and bad. Do not drink _____.', options: ['it', 'its', 'coffee'], a: 'it'},
                {q: 'I do not like _____. He is not a nice person.', options: ['he', 'him', 'his'], a: 'him'},
                {q: 'Is this a photo of _____? Yes, he is on holiday.', options: ['he', 'him', 'his'], a: 'him'},
                {q: 'This city is fantastic! I love _____.', options: ['it', 'its', 'city'], a: 'it'},
                {q: 'I love my parents. I call _____ every day.', options: ['they', 'them', 'their'], a: 'them'},
                {q: 'I do not like our teacher. He is always angry at _____.', options: ['we', 'us', 'our'], a: 'us'},
                {q: 'Where is your brother? I do not talk to _____ often.', options: ['he', 'him', 'his'], a: 'him'}
            ]
        };

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US'; utterance.rate = 0.8;
                window.speechSynthesis.speak(utterance);
            } else { alert('浏览器不支持语音朗读'); }
        }
        function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }
        let dictationMode = 'cn2en', currentQuestions = [], currentIndex = 0, wrongAttempts = 0, score = 0;

        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
            if (tabName === 'grammar') initCanExamples();
            if (tabName === 'vocab') initVocab();
            if (tabName === 'reading') initReading();
        }
        function createVocabCard(item) {
            return '<div class="vocab-card"><button class="speaker-btn" onclick="speak(' + "'" + item.en.replace(/'/g, "\\'") + "'" + ')">🔊</button><div class="en">' + item.en + '</div><div>' + item.cn + '</div></div>';
        }
        function initCanExamples() {
            document.getElementById('can-examples').innerHTML = lessonData.canExamples.map(function(s) {
                return '<div class="example-box">' + s + '</div>';
            }).join('');
        }
        function initVocab() {
            document.getElementById('vocab-activities').innerHTML = lessonData.activities.map(createVocabCard).join('');
            document.getElementById('vocab-more').innerHTML = lessonData.moreWords.map(createVocabCard).join('');
        }
        function initReading() {
            document.getElementById('reading-sentences').innerHTML = lessonData.reading.map(function(s) {
                return '<div class="reading-item">' + s + '<button class="speaker-btn" onclick="speak(' + "'" + s.replace(/'/g, "\\'") + "'" + ')">🔊</button></div>';
            }).join('');
        }
        function setDictationMode(mode) {
            dictationMode = mode;
            document.querySelectorAll('.mode-toggle button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            startDictation();
        }
        function startDictation() {
            const allVocab = [...lessonData.activities, ...lessonData.moreWords];
            currentQuestions = shuffle(allVocab).slice(0, 10);
            currentIndex = 0; score = 0;
            showDictationQuestion();
        }
        function showDictationQuestion() {
            if (currentIndex >= currentQuestions.length) { showCompletion('dictation-quiz', score, currentQuestions.length); return; }
            wrongAttempts = 0;
            const q = currentQuestions[currentIndex];
            const prompt = dictationMode === 'cn2en' ? q.cn : q.en;
            const answer = dictationMode === 'cn2en' ? q.en : q.cn;
            document.getElementById('dictation-quiz').innerHTML = 
                '<div class="quiz-progress">题目 ' + (currentIndex + 1) + ' / ' + currentQuestions.length + '</div>' +
                '<div class="quiz-question">' + (dictationMode === 'cn2en' ? '请输入英文：' : '请输入中文：') + '<br><br><strong>' + prompt + '</strong>' +
                (dictationMode === 'cn2en' ? '<button class="quiz-btn" onclick="speak(' + "'" + answer.replace(/'/g, "\\'") + "'" + ')" style="margin-left:10px;">🔊 朗读</button>' : '') + '</div>' +
                '<input type="text" class="quiz-input" id="answer-input" placeholder="请输入答案">' +
                '<br><button class="quiz-btn" onclick="checkDictationAnswer()">提交答案</button>' +
                '<div id="hint-btn-container"></div><div class="quiz-feedback" id="feedback"></div>';
            document.getElementById('answer-input').onkeypress = function(e) { if(e.key==='Enter') checkDictationAnswer(); };
            setTimeout(() => document.getElementById('answer-input').focus(), 100);
        }
        function checkDictationAnswer() {
            const input = document.getElementById('answer-input'), feedback = document.getElementById('feedback');
            const q = currentQuestions[currentIndex];
            const correctAnswer = dictationMode === 'cn2en' ? q.en : q.cn;
            const userAnswer = input.value.trim();
            if (!userAnswer) return;
            if (userAnswer.toLowerCase() === correctAnswer.toLowerCase()) {
                score++;
                input.className = 'quiz-input correct'; input.disabled = true;
                feedback.className = 'quiz-feedback show correct'; feedback.textContent = '回答正确！';
                setTimeout(() => { currentIndex++; showDictationQuestion(); }, 1200);
            } else {
                wrongAttempts++;
                input.className = 'quiz-input wrong';
                feedback.className = 'quiz-feedback show wrong';
                feedback.textContent = '回答错误（第' + wrongAttempts + '次尝试）';
                input.value = ''; input.focus();
                WrongAnswersManager.save({type: 'dictation', q: prompt, a: correctAnswer, lesson: 'L3'});
                if (wrongAttempts >= 3) document.getElementById('hint-btn-container').innerHTML = '<button class="quiz-btn hint-btn" onclick="showAnswer(' + "'" + correctAnswer.replace(/'/g, "\\'") + "'" + ')">显示答案</button>';
            }
        }
        function showAnswer(answer) {
            document.getElementById('feedback').innerHTML = '<div class="answer-display">正确答案：' + answer + '</div>';
            document.getElementById('feedback').className = 'quiz-feedback show';
            setTimeout(() => { currentIndex++; showDictationQuestion(); }, 5000);
        }
        function startFillBlank() {
            currentQuestions = shuffle(lessonData.fillBlank).slice(0, 8);
            currentIndex = 0; score = 0;
            showFillBlankQuestion();
        }
        function showFillBlankQuestion() {
            if (currentIndex >= currentQuestions.length) { showCompletion('fillblank-quiz', score, currentQuestions.length); return; }
            wrongAttempts = 0;
            const q = currentQuestions[currentIndex];
            document.getElementById('fillblank-quiz').innerHTML = 
                '<div class="quiz-progress">题目 ' + (currentIndex + 1) + ' / ' + currentQuestions.length + '</div>' +
                '<div class="quiz-question">' + q.q.replace('___', '_____') + '</div>' +
                '<div class="hint-text" id="hint-text">提示：' + q.hint + '</div>' +
                '<input type="text" class="quiz-input" id="answer-input" placeholder="填入 can/cannot">' +
                '<br><button class="quiz-btn" onclick="checkFillBlankAnswer()">提交答案</button>' +
                '<div id="hint-btn-container"></div><div class="quiz-feedback" id="feedback"></div>';
            document.getElementById('answer-input').onkeypress = function(e) { if(e.key==='Enter') checkFillBlankAnswer(); };
            setTimeout(() => document.getElementById('answer-input').focus(), 100);
        }
        function checkFillBlankAnswer() {
            const input = document.getElementById('answer-input'), feedback = document.getElementById('feedback'), hintText = document.getElementById('hint-text');
            const q = currentQuestions[currentIndex];
            const userAnswer = input.value.trim().toLowerCase();
            if (!userAnswer) return;
            const isCorrect = userAnswer === q.a.toLowerCase() || (q.a === 'cannot' && (userAnswer === "can't" || userAnswer === 'can not'));
            if (isCorrect) {
                score++;
                input.className = 'quiz-input correct'; input.disabled = true;
                feedback.className = 'quiz-feedback show correct'; feedback.textContent = '回答正确！';
                WrongAnswersManager.recordCorrect({type: 'fillblank', q: q.q, a: q.a, hint: q.hint, lesson: 'L3'});
                setTimeout(() => { currentIndex++; showFillBlankQuestion(); }, 1200);
            } else {
                wrongAttempts++;
                input.className = 'quiz-input wrong';
                feedback.className = 'quiz-feedback show wrong';
                feedback.textContent = '回答错误（第' + wrongAttempts + '次尝试）';
                hintText.classList.add('show');
                input.value = ''; input.focus();
                WrongAnswersManager.save({type: 'fillblank', q: q.q, a: q.a, hint: q.hint, lesson: 'L3'});
                if (wrongAttempts >= 3) document.getElementById('hint-btn-container').innerHTML = '<button class="quiz-btn hint-btn" onclick="showFillBlankAnswer()">显示答案</button>';
            }
        }
        function showFillBlankAnswer() {
            const q = currentQuestions[currentIndex];
            document.getElementById('feedback').innerHTML = '<div class="answer-display">正确答案：' + q.a + '</div>';
            document.getElementById('feedback').className = 'quiz-feedback show';
            setTimeout(() => { currentIndex++; showFillBlankQuestion(); }, 5000);
        }
        function startTranslate() {
            currentQuestions = shuffle(lessonData.translations).slice(0, 8);
            currentIndex = 0; score = 0;
            showTranslateQuestion();
        }
        function showTranslateQuestion() {
            if (currentIndex >= currentQuestions.length) { showCompletion('translate-quiz', score, currentQuestions.length); return; }
            wrongAttempts = 0;
            const q = currentQuestions[currentIndex];
            document.getElementById('translate-quiz').innerHTML = 
                '<div class="quiz-progress">题目 ' + (currentIndex + 1) + ' / ' + currentQuestions.length + '</div>' +
                '<div class="quiz-question">请将以下中文翻译成英文：<br><br><strong style="font-size:1.3em;">"' + q.cn + '"</strong></div>' +
                '<textarea class="quiz-input" id="answer-input" rows="3" placeholder="请输入英文翻译"></textarea>' +
                '<br><button class="quiz-btn" onclick="checkTranslateAnswer()">提交答案</button>' +
                '<div id="hint-btn-container"></div><div class="quiz-feedback" id="feedback"></div>';
            setTimeout(() => document.getElementById('answer-input').focus(), 100);
        }
        function checkTranslateAnswer() {
            const input = document.getElementById('answer-input'), feedback = document.getElementById('feedback');
            const q = currentQuestions[currentIndex];
            const userAnswer = input.value.trim().toLowerCase().replace(/[^a-z\s]/g, '');
            const correctAnswer = q.en.toLowerCase().replace(/[^a-z\s]/g, '');
            if (!userAnswer) return;
            if (userAnswer === correctAnswer) {
                score++;
                input.className = 'quiz-input correct'; input.disabled = true;
                feedback.className = 'quiz-feedback show correct'; feedback.textContent = '回答正确！';
                WrongAnswersManager.recordCorrect({type: 'translate', cn: q.cn, en: q.en, lesson: 'L3'});
                setTimeout(() => { currentIndex++; showTranslateQuestion(); }, 1200);
            } else {
                wrongAttempts++;
                input.className = 'quiz-input wrong';
                feedback.className = 'quiz-feedback show wrong';
                feedback.textContent = '回答错误（第' + wrongAttempts + '次尝试）';
                WrongAnswersManager.save({type: 'translate', cn: q.cn, en: q.en, lesson: 'L3'});
                if (wrongAttempts >= 3) document.getElementById('hint-btn-container').innerHTML = '<button class="quiz-btn hint-btn" onclick="showTranslateAnswer()">显示答案</button>';
            }
        }
        function showTranslateAnswer() {
            const q = currentQuestions[currentIndex];
            document.getElementById('feedback').innerHTML = '<div class="answer-display">参考答案：' + q.en + '</div>';
            document.getElementById('feedback').className = 'quiz-feedback show';
            setTimeout(() => { currentIndex++; showTranslateQuestion(); }, 5000);
        }
        function startPronoun() {
            currentQuestions = shuffle(lessonData.pronouns).slice(0, 8);
            currentIndex = 0; score = 0;
            showPronounQuestion();
        }
        function showPronounQuestion() {
            if (currentIndex >= currentQuestions.length) { showCompletion('pronoun-quiz', score, currentQuestions.length); return; }
            wrongAttempts = 0;
            const q = currentQuestions[currentIndex];
            document.getElementById('pronoun-quiz').innerHTML = 
                '<div class="quiz-progress">题目 ' + (currentIndex + 1) + ' / ' + currentQuestions.length + '</div>' +
                '<div class="quiz-question">' + q.q + '</div>' +
                '<div class="option-group" id="options"></div>' +
                '<div id="hint-btn-container"></div><div class="quiz-feedback" id="feedback"></div>';
            const optContainer = document.getElementById('options');
            q.options.forEach(function(opt) {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.onclick = function() { checkPronounAnswer(opt); };
                optContainer.appendChild(btn);
            });
        }
        function checkPronounAnswer(selected) {
            const q = currentQuestions[currentIndex];
            const feedback = document.getElementById('feedback');
            document.querySelectorAll('.option-btn').forEach(function(btn) {
                btn.disabled = true;
                if (btn.textContent === q.a) btn.classList.add('selected');
            });
            if (selected === q.a) {
                score++;
                feedback.className = 'quiz-feedback show correct';
                feedback.textContent = '回答正确！';
                WrongAnswersManager.recordCorrect({type: 'pronoun', q: q.q, a: q.a, lesson: 'L3'});
                setTimeout(() => { currentIndex++; showPronounQuestion(); }, 1200);
            } else {
                wrongAttempts++;
                feedback.className = 'quiz-feedback show wrong';
                feedback.textContent = '回答错误（第' + wrongAttempts + '次尝试）';
                WrongAnswersManager.save({type: 'pronoun', q: q.q, a: q.a, lesson: 'L3'});
                if (wrongAttempts >= 3) document.getElementById('hint-btn-container').innerHTML = '<button class="quiz-btn hint-btn" onclick="showPronounAnswer()">显示答案</button>';
            }
        }
        function showPronounAnswer() {
            const q = currentQuestions[currentIndex];
            document.getElementById('feedback').innerHTML = '<div class="answer-display">正确答案：' + q.a + '</div>';
            document.getElementById('feedback').className = 'quiz-feedback show';
            setTimeout(() => { currentIndex++; showPronounQuestion(); }, 5000);
        }
        function showCompletion(containerId, score, total) {
            const percentage = Math.round(score / total * 100);
            let stars = '⭐';
            if (percentage >= 60) stars = '⭐⭐';
            if (percentage >= 80) stars = '⭐⭐⭐';
            if (percentage === 100) stars = '🏆⭐⭐⭐🏆';
            document.getElementById(containerId).innerHTML = '<div class="completion-message"><h2>练习完成！</h2><div class="stars">' + stars + '</div><p style="font-size:1.3em;">得分：' + score + ' / ' + total + ' (' + percentage + '%)</p><button class="quiz-btn" onclick="location.reload()">再来一次</button></div>';
        }
        initCanExamples(); initVocab(); initReading();
    </script>
</body>
</html>
