<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>综合练习 - 英语学习</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            padding: 10px;
        }
        .container { 
            max-width: 800px; 
            margin: 0 auto; 
            background: white; 
            border-radius: 16px; 
            padding: 25px 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
            flex-wrap: wrap;
            gap: 10px;
        }
        h1 { 
            color: #333; 
            font-size: clamp(1.3rem, 5vw, 1.8rem);
        }
        .back-btn { 
            background: #667eea; 
            color: white; 
            padding: 10px 18px;
            border-radius: 8px; 
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .mode-selector { 
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .mode-btn { 
            padding: 15px 10px;
            background: #f0f0f0; 
            border: 2px solid transparent;
            border-radius: 10px; 
            cursor: pointer; 
            text-align: center;
            font-size: 0.95rem;
            font-weight: 500;
        }
        .mode-btn.active { 
            background: #667eea; 
            color: white; 
        }
        .quiz-container { 
            background: #f8f9fa; 
            padding: 25px 15px;
            border-radius: 12px;
            min-height: 300px;
            text-align: center;
        }
        .quiz-progress { 
            margin-bottom: 15px; 
            color: #667eea; 
            font-size: 1rem;
            font-weight: 500;
        }
        .quiz-question { 
            font-size: clamp(1.1rem, 4.5vw, 1.5rem);
            margin: 20px 0; 
            color: #333;
            line-height: 1.5;
            word-break: break-word;
        }
        .quiz-input { 
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd; 
            border-radius: 10px; 
            font-size: 1.1rem;
            text-align: center; 
            margin: 15px 0;
            -webkit-appearance: none;
        }
        .quiz-input.correct { border-color: #28a745; background: #d4edda; }
        .quiz-input.wrong { border-color: #dc3545; background: #f8d7da; }
        .quiz-btn { 
            background: #667eea; 
            color: white; 
            border: none; 
            padding: 14px 35px;
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 1.05rem;
            margin: 8px 5px;
            font-weight: 500;
            min-width: 120px;
        }
        .quiz-btn:active { transform: scale(0.96); }
        .quiz-btn.hint-btn { background: #ffc107; color: #333; }
        .quiz-btn.secondary { background: #6c757d; }
        .quiz-feedback { 
            margin-top: 15px; 
            padding: 12px;
            border-radius: 8px; 
            font-size: 1rem;
            display: none; 
        }
        .quiz-feedback.show { display: block; }
        .quiz-feedback.correct { background: #d4edda; color: #155724; }
        .quiz-feedback.wrong { background: #f8d7da; color: #721c24; }
        .lesson-tag { 
            display: inline-block; 
            background: #667eea; 
            color: white; 
            padding: 4px 10px;
            border-radius: 4px; 
            font-size: 0.75rem;
            margin-left: 8px;
        }
        .mode-toggle { margin-bottom: 20px; }
        .mode-toggle button { 
            padding: 10px 18px;
            margin: 0 4px; 
            border: 2px solid #667eea; 
            background: white; 
            color: #667eea; 
            border-radius: 8px; 
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .mode-toggle button.active { background: #667eea; color: white; }
        .completion-message { text-align: center; padding: 30px 15px; }
        .completion-message h2 { 
            color: #28a745; 
            margin-bottom: 15px;
            font-size: 1.5rem;
        }
        .stars { font-size: 2.5rem; margin: 15px 0; }
        .answer-display { 
            font-size: 1.2rem;
            color: #667eea; 
            font-weight: bold; 
            margin: 12px 0; 
            padding: 15px;
            background: #e7e9ff; 
            border-radius: 8px;
            word-break: break-word;
        }
        .hint-text { color: #888; font-size: 0.9rem; margin: 10px 0; display: none; }
        .hint-text.show { display: block; }

        @media (min-width: 600px) {
            .mode-selector { grid-template-columns: repeat(3, 1fr); }
        }
        @media (min-width: 768px) {
            body { padding: 20px; }
            .container { padding: 40px; border-radius: 20px; }
            .quiz-container { padding: 40px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>综合练习</h1>
            <a href="index.html" class="back-btn">← 返回</a>
        </div>
        <div class="mode-selector">
            <button class="mode-btn" id="btn-dictation" onclick="setMode('dictation')">单词默写</button>
            <button class="mode-btn" id="btn-fillblank" onclick="setMode('fillblank')">填空练习</button>
            <button class="mode-btn" id="btn-translate" onclick="setMode('translate')">翻译练习</button>
        </div>
        <div class="quiz-container" id="quiz-area">
            <div style="text-align:center;padding:40px 20px;">
                <h2 style="margin-bottom:15px;">欢迎来到综合练习</h2>
                <p style="margin:15px 0;color:#666;">请从上方选择一种练习模式开始</p>
                <p style="color:#999;font-size:0.9rem;">所有题目都来自你的学习资料</p>
            </div>
        </div>
    </div>
    <script>
        // 错题管理器
        const WrongAnswersManager = {
            getStorageKey(lesson) { return `english_learning_wrong_answers_l${lesson}`; },
            save(wrongItem, lessonNum) {
                const key = JSON.stringify({q: wrongItem.q || wrongItem.cn || wrongItem.en, type: wrongItem.type});
                const storageKey = this.getStorageKey(lessonNum);
                const all = JSON.parse(localStorage.getItem(storageKey) || '{}');
                if (!all[key]) { all[key] = { ...wrongItem, correctCount: 0, lastWrong: Date.now(), lesson: lessonNum }; }
                localStorage.setItem(storageKey, JSON.stringify(all));
            },
            recordCorrect(wrongItem, lessonNum) {
                const key = JSON.stringify({q: wrongItem.q || wrongItem.cn || wrongItem.en, type: wrongItem.type});
                const storageKey = this.getStorageKey(lessonNum);
                const all = JSON.parse(localStorage.getItem(storageKey) || '{}');
                if (all[key]) { 
                    all[key].correctCount++; 
                    if (all[key].correctCount >= 5) { delete all[key]; } 
                    localStorage.setItem(storageKey, JSON.stringify(all)); 
                }
            }
        };

        // 课程数据
        const allData = {
            lesson1: {
                vocab: [
                    {en: 'teacher', cn: '老师'}, {en: 'student', cn: '学生'}, {en: 'friend', cn: '朋友'},
                    {en: 'boss', cn: '老板'}, {en: 'colleague', cn: '同事'}, {en: 'roommate', cn: '室友'},
                    {en: 'busy', cn: '忙碌的'}, {en: 'late', cn: '迟到的'}, {en: 'early', cn: '早的'},
                    {en: 'tired', cn: '累的'}, {en: 'bad', cn: '坏的'}, {en: 'good', cn: '好的'},
                    {en: 'cold', cn: '冷的'}, {en: 'hot', cn: '热的'}
                ],
                fillBlank: [
                    {q: 'I ___ happy.', a: 'am', hint: '第一人称用 am'}, {q: 'She ___ tired.', a: 'is', hint: '第三人称单数用 is'},
                    {q: 'They ___ good students.', a: 'are', hint: '复数用 are'}, {q: '___ I late?', a: 'Am', hint: '第一人称疑问用 Am'},
                    {q: '___ you cold?', a: 'Are', hint: 'you 疑问用 Are'}, {q: '___ she your friend?', a: 'Is', hint: '第三人称疑问用 Is'}
                ],
                translate: [
                    {cn: '我很忙，也很累。', en: 'I am busy and tired.'}, {cn: '你冷吗？', en: 'Are you cold?'},
                    {cn: '不，我很热。', en: 'No, I am hot.'}, {cn: '我们是学生，你是老师。', en: 'We are students, you are a teacher.'}
                ]
            },
            lesson2: {
                vocab: [
                    {en: 'live in apartment', cn: '住在公寓'}, {en: 'have children', cn: '有孩子'},
                    {en: 'watch TV', cn: '看电视'}, {en: 'listen to music', cn: '听音乐'},
                    {en: 'eat fast food', cn: '吃快餐'}, {en: 'drink coffee', cn: '喝咖啡'},
                    {en: 'speak English', cn: '说英语'}, {en: 'work in a bank', cn: '在银行工作'}
                ],
                fillBlank: [
                    {q: 'I ___ two brothers.', a: 'have', hint: '第一人称用 have'}, {q: 'My wife ___ a car.', a: 'has', hint: '第三人称单数用 has'},
                    {q: '___ you live here?', a: 'Do', hint: '疑问句用 Do'}, {q: '___ she work in a bank?', a: 'Does', hint: '第三人称疑问用 Does'}
                ],
                translate: [
                    {cn: '你住在这里附近吗？', en: 'Do you live near here?'}, {cn: '你喜欢什么颜色？', en: 'What color do you like?'},
                    {cn: '他们说西班牙语吗？', en: 'Do they speak Spanish?'}, {cn: '我听流行音乐。', en: 'I listen to pop music.'}
                ]
            },
            lesson3: {
                vocab: [
                    {en: 'cinema', cn: '电影院'}, {en: 'beach', cn: '海滩'}, {en: 'play tennis', cn: '打网球'},
                    {en: 'swim', cn: '游泳'}, {en: 'restaurant', cn: '餐厅'}, {en: 'drive', cn: '开车'}
                ],
                fillBlank: [
                    {q: 'I ___ drive a car.', a: 'can', hint: '表达能力用 can'}, {q: '___ you help me?', a: 'Can', hint: '请求帮助用 Can'},
                    {q: '___ I sit here?', a: 'Can', hint: '请求许可用 Can'}, {q: 'No, you ___.', a: 'cannot', hint: '否定回答'}
                ],
                translate: [
                    {cn: '你不可以在医院用手机。', en: 'You cannot use mobile phone in hospital.'},
                    {cn: '你可以跟我一起去电影院吗？', en: 'Can you go to the cinema with me?'}, {cn: '我不确定。', en: 'I am not sure.'}
                ]
            }
        };

        let currentMode = '';
        let dictationMode = 'cn2en';
        let currentQuestions = [], currentIndex = 0, wrongAttempts = 0, score = 0;

        function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

        // 设置练习模式
        function setMode(mode) {
            currentMode = mode;
            
            // 更新按钮状态
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + mode).classList.add('active');
            
            // 开始对应练习
            if (mode === 'dictation') {
                showDictationStart();
            } else if (mode === 'fillblank') {
                startFillBlank();
            } else if (mode === 'translate') {
                startTranslate();
            }
        }

        // 单词默写 - 选择模式
        function showDictationStart() {
            document.getElementById('quiz-area').innerHTML = 
                '<div class="mode-toggle">' +
                '<button class="active" onclick="setDictationMode(' + "'cn2en'" + ')">中译英</button>' +
                '<button onclick="setDictationMode(' + "'en2cn'" + ')">英译中</button>' +
                '</div>' +
                '<div style="text-align:center;padding:30px 20px;">' +
                '<h3>单词默写</h3>' +
                '<p style="color:#666;margin:15px 0;">选择模式后开始练习</p>' +
                '</div>';
            setTimeout(startDictation, 100);
        }

        function setDictationMode(mode) {
            dictationMode = mode;
            document.querySelectorAll('.mode-toggle button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            startDictation();
        }

        function startDictation() {
            const allVocab = [
                ...allData.lesson1.vocab.map(v => ({...v, lesson: 1})),
                ...allData.lesson2.vocab.map(v => ({...v, lesson: 2})),
                ...allData.lesson3.vocab.map(v => ({...v, lesson: 3}))
            ];
            currentQuestions = shuffle(allVocab).slice(0, 10);
            currentIndex = 0; score = 0;
            showDictationQuestion();
        }

        function showDictationQuestion() {
            if (currentIndex >= currentQuestions.length) { 
                showCompletion(score, currentQuestions.length); 
                return; 
            }
            wrongAttempts = 0;
            const q = currentQuestions[currentIndex];
            const prompt = dictationMode === 'cn2en' ? q.cn : q.en;
            const answer = dictationMode === 'cn2en' ? q.en : q.cn;
            
            document.getElementById('quiz-area').innerHTML = 
                '<div class="quiz-progress">题目 ' + (currentIndex + 1) + ' / ' + currentQuestions.length + '</div>' +
                '<div class="quiz-question">' + (dictationMode === 'cn2en' ? '请输入英文：' : '请输入中文：') + '<br><br><strong>' + prompt + '</strong><span class="lesson-tag">L' + q.lesson + '</span></div>' +
                '<input type="text" class="quiz-input" id="answer-input" placeholder="请输入答案">' +
                '<br><button class="quiz-btn" onclick="checkDictationAnswer()">提交答案</button>' +
                '<div id="hint-btn-container"></div><div class="quiz-feedback" id="feedback"></div>';
            
            document.getElementById('answer-input').onkeypress = function(e) { if(e.key==='Enter') checkDictationAnswer(); };
            setTimeout(() => document.getElementById('answer-input').focus(), 100);
        }

        function checkDictationAnswer() {
            const input = document.getElementById('answer-input'), feedback = document.getElementById('feedback');
            const q = currentQuestions[currentIndex];
            const correctAnswer = dictationMode === 'cn2en' ? q.en : q.cn;
            const userAnswer = input.value.trim();
            if (!userAnswer) return;
            
            if (userAnswer.toLowerCase() === correctAnswer.toLowerCase()) {
                score++;
                input.className = 'quiz-input correct'; input.disabled = true;
                feedback.className = 'quiz-feedback show correct'; feedback.textContent = '✅ 回答正确！';
                setTimeout(() => { currentIndex++; showDictationQuestion(); }, 1200);
            } else {
                wrongAttempts++;
                input.className = 'quiz-input wrong';
                feedback.className = 'quiz-feedback show wrong';
                feedback.textContent = '❌ 回答错误（第' + wrongAttempts + '次尝试）';
                input.value = ''; input.focus();
                const questionText = dictationMode === 'cn2en' ? q.cn : q.en; WrongAnswersManager.save({type: 'dictation', q: questionText, a: correctAnswer, lesson: 'L' + q.lesson}, q.lesson);
                if (wrongAttempts >= 3) document.getElementById('hint-btn-container').innerHTML = '<button class="quiz-btn hint-btn" onclick="showAnswer(' + "'" + correctAnswer.replace(/'/g, "\\'") + "'" + ')">💡 显示答案</button>';
            }
        }

        function startFillBlank() {
            const allQ = [
                ...allData.lesson1.fillBlank.map(q => ({...q, lesson: 1})),
                ...allData.lesson2.fillBlank.map(q => ({...q, lesson: 2})),
                ...allData.lesson3.fillBlank.map(q => ({...q, lesson: 3}))
            ];
            currentQuestions = shuffle(allQ).slice(0, 10);
            currentIndex = 0; score = 0;
            showFillBlankQuestion();
        }

        function showFillBlankQuestion() {
            if (currentIndex >= currentQuestions.length) { 
                showCompletion(score, currentQuestions.length); 
                return; 
            }
            wrongAttempts = 0;
            const q = currentQuestions[currentIndex];
            
            document.getElementById('quiz-area').innerHTML = 
                '<div class="quiz-progress">题目 ' + (currentIndex + 1) + ' / ' + currentQuestions.length + '</div>' +
                '<div class="quiz-question">' + q.q.replace('___', '_____') + '<span class="lesson-tag">L' + q.lesson + '</span></div>' +
                '<div class="hint-text" id="hint-text">💡 提示：' + q.hint + '</div>' +
                '<input type="text" class="quiz-input" id="answer-input" placeholder="填入正确答案">' +
                '<br><button class="quiz-btn" onclick="checkFillBlankAnswer()">提交答案</button>' +
                '<div id="hint-btn-container"></div><div class="quiz-feedback" id="feedback"></div>';
            
            document.getElementById('answer-input').onkeypress = function(e) { if(e.key==='Enter') checkFillBlankAnswer(); };
            setTimeout(() => document.getElementById('answer-input').focus(), 100);
        }

        function checkFillBlankAnswer() {
            const input = document.getElementById('answer-input'), feedback = document.getElementById('feedback'), hintText = document.getElementById('hint-text');
            const q = currentQuestions[currentIndex];
            const userAnswer = input.value.trim().toLowerCase();
            if (!userAnswer) return;
            
            const isCorrect = userAnswer === q.a.toLowerCase() || (q.a === 'cannot' && (userAnswer === "can't" || userAnswer === 'can not'));
            if (isCorrect) {
                score++;
                input.className = 'quiz-input correct'; input.disabled = true;
                feedback.className = 'quiz-feedback show correct'; feedback.textContent = '✅ 回答正确！';
                setTimeout(() => { currentIndex++; showFillBlankQuestion(); }, 1200);
            } else {
                wrongAttempts++;
                input.className = 'quiz-input wrong';
                feedback.className = 'quiz-feedback show wrong';
                feedback.textContent = '❌ 回答错误（第' + wrongAttempts + '次尝试）';
                hintText.classList.add('show');
                input.value = ''; input.focus();
                WrongAnswersManager.save({type: 'fillblank', q: q.q, a: q.a, hint: q.hint, lesson: 'L' + q.lesson}, q.lesson);
                if (wrongAttempts >= 3) document.getElementById('hint-btn-container').innerHTML = '<button class="quiz-btn hint-btn" onclick="showFillBlankAnswer()">💡 显示答案</button>';
            }
        }

        function showFillBlankAnswer() {
            const q = currentQuestions[currentIndex];
            document.getElementById('feedback').innerHTML = '<div class="answer-display">正确答案：' + q.a + '</div>';
            document.getElementById('feedback').className = 'quiz-feedback show';
            setTimeout(() => { currentIndex++; showFillBlankQuestion(); }, 5000);
        }

        function startTranslate() {
            const allQ = [
                ...allData.lesson1.translate.map(q => ({...q, lesson: 1})),
                ...allData.lesson2.translate.map(q => ({...q, lesson: 2})),
                ...allData.lesson3.translate.map(q => ({...q, lesson: 3}))
            ];
            currentQuestions = shuffle(allQ).slice(0, 10);
            currentIndex = 0; score = 0;
            showTranslateQuestion();
        }

        function showTranslateQuestion() {
            if (currentIndex >= currentQuestions.length) { 
                showCompletion(score, currentQuestions.length); 
                return; 
            }
            wrongAttempts = 0;
            const q = currentQuestions[currentIndex];
            
            document.getElementById('quiz-area').innerHTML = 
                '<div class="quiz-progress">题目 ' + (currentIndex + 1) + ' / ' + currentQuestions.length + '</div>' +
                '<div class="quiz-question">请将以下中文翻译成英文：<br><br><strong>"' + q.cn + '"</strong><span class="lesson-tag">L' + q.lesson + '</span></div>' +
                '<textarea class="quiz-input" id="answer-input" rows="3" placeholder="请输入英文翻译"></textarea>' +
                '<br><button class="quiz-btn" onclick="checkTranslateAnswer()">提交答案</button>' +
                '<div id="hint-btn-container"></div><div class="quiz-feedback" id="feedback"></div>';
            
            setTimeout(() => document.getElementById('answer-input').focus(), 100);
        }

        function checkTranslateAnswer() {
            const input = document.getElementById('answer-input'), feedback = document.getElementById('feedback');
            const q = currentQuestions[currentIndex];
            const userAnswer = input.value.trim().toLowerCase().replace(/[^a-z\\s]/g, '');
            const correctAnswer = q.en.toLowerCase().replace(/[^a-z\\s]/g, '');
            if (!userAnswer) return;
            
            if (userAnswer === correctAnswer) {
                score++;
                input.className = 'quiz-input correct'; input.disabled = true;
                feedback.className = 'quiz-feedback show correct'; feedback.textContent = '✅ 回答正确！';
                setTimeout(() => { currentIndex++; showTranslateQuestion(); }, 1200);
            } else {
                wrongAttempts++;
                input.className = 'quiz-input wrong';
                feedback.className = 'quiz-feedback show wrong';
                feedback.textContent = '❌ 回答错误（第' + wrongAttempts + '次尝试）';
                WrongAnswersManager.save({type: 'translate', cn: q.cn, en: q.en, lesson: 'L' + q.lesson}, q.lesson);
                if (wrongAttempts >= 3) document.getElementById('hint-btn-container').innerHTML = '<button class="quiz-btn hint-btn" onclick="showTranslateAnswer()">💡 显示答案</button>';
            }
        }

        function showTranslateAnswer() {
            const q = currentQuestions[currentIndex];
            document.getElementById('feedback').innerHTML = '<div class="answer-display">参考答案：' + q.en + '</div>';
            document.getElementById('feedback').className = 'quiz-feedback show';
            setTimeout(() => { currentIndex++; showTranslateQuestion(); }, 5000);
        }

        function showAnswer(answer) {
            document.getElementById('feedback').innerHTML = '<div class="answer-display">正确答案：' + answer + '</div>';
            document.getElementById('feedback').className = 'quiz-feedback show';
            setTimeout(() => { 
                currentIndex++; 
                if (currentMode === 'dictation') showDictationQuestion();
            }, 5000);
        }

        function showCompletion(score, total) {
            const percentage = Math.round(score / total * 100);
            let stars = '⭐';
            if (percentage >= 60) stars = '⭐⭐';
            if (percentage >= 80) stars = '⭐⭐⭐';
            if (percentage === 100) stars = '🏆⭐⭐⭐🏆';
            document.getElementById('quiz-area').innerHTML = 
                '<div class="completion-message">' +
                '<h2>🎉 练习完成！</h2>' +
                '<div class="stars">' + stars + '</div>' +
                '<p style="font-size:1.3em;">得分：' + score + ' / ' + total + ' (' + percentage + '%)</p>' +
                '<button class="quiz-btn" onclick="location.reload()">再来一次</button>' +
                '</div>';
        }
    </script>
</body>
</html>
