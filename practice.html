<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>综合练习 - 英语学习</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 20px; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid #eee; }
        h1 { color: #333; }
        .back-btn { background: #667eea; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; }
        .mode-selector { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .mode-btn { flex: 1; min-width: 120px; padding: 15px; background: #f0f0f0; border: 2px solid transparent; border-radius: 10px; cursor: pointer; text-align: center; }
        .mode-btn.active { background: #667eea; color: white; }
        .quiz-container { background: #f8f9fa; padding: 40px; border-radius: 15px; min-height: 350px; text-align: center; }
        .quiz-progress { margin-bottom: 20px; color: #667eea; font-size: 1.2em; }
        .quiz-question { font-size: 1.6em; margin: 30px 0; color: #333; }
        .quiz-input { width: 100%; max-width: 450px; padding: 18px; border: 2px solid #ddd; border-radius: 12px; font-size: 1.3em; text-align: center; margin: 20px 0; }
        .quiz-input.correct { border-color: #28a745; background: #d4edda; }
        .quiz-input.wrong { border-color: #dc3545; background: #f8d7da; }
        .quiz-btn { background: #667eea; color: white; border: none; padding: 15px 40px; border-radius: 10px; cursor: pointer; font-size: 1.1em; margin: 10px; }
        .quiz-btn.hint-btn { background: #ffc107; color: #333; }
        .quiz-feedback { margin-top: 20px; padding: 15px; border-radius: 10px; font-size: 1.1em; display: none; }
        .quiz-feedback.show { display: block; }
        .quiz-feedback.correct { background: #d4edda; color: #155724; }
        .quiz-feedback.wrong { background: #f8d7da; color: #721c24; }
        .lesson-tag { display: inline-block; background: #667eea; color: white; padding: 4px 12px; border-radius: 4px; font-size: 0.8em; margin-left: 10px; }
        .mode-toggle { margin-bottom: 20px; }
        .mode-toggle button { padding: 10px 20px; margin: 0 5px; border: 2px solid #667eea; background: white; color: #667eea; border-radius: 8px; cursor: pointer; }
        .mode-toggle button.active { background: #667eea; color: white; }
        .completion-message { text-align: center; padding: 40px; }
        .completion-message h2 { color: #28a745; margin-bottom: 20px; }
        .stars { font-size: 3em; margin: 20px 0; }
        .answer-display { font-size: 1.3em; color: #667eea; font-weight: bold; margin: 15px 0; padding: 15px; background: #e7e9ff; border-radius: 8px; }
        .hint-text { color: #888; font-size: 0.9em; margin: 10px 0; display: none; }
        .hint-text.show { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>综合练习</h1>
            <a href="index.html" class="back-btn">返回首页</a>
        </div>
        <div class="mode-selector">
            <button class="mode-btn" onclick="setMode('dictation')">单词默写</button>
            <button class="mode-btn" onclick="setMode('fillblank')">填空练习</button>
            <button class="mode-btn" onclick="setMode('translate')">翻译练习</button>
        </div>
        <div class="quiz-container" id="quiz-area">
            <div style="text-align:center;padding:40px;">
                <h2>欢迎来到综合练习</h2>
                <p style="margin:20px 0;color:#666;">请从上方选择一种练习模式开始</p>
                <p style="color:#999;">所有题目都来自你的学习资料</p>
            </div>
        </div>
    </div>
    <script>
        const WrongAnswersManager = {
            STORAGE_KEYS: ['english_learning_wrong_answers_l1', 'english_learning_wrong_answers_l2', 'english_learning_wrong_answers_l3'],
            getAllWrong() {
                let all = [];
                this.STORAGE_KEYS.forEach(key => {
                    const data = localStorage.getItem(key);
                    if (data) { const parsed = JSON.parse(data); all = all.concat(Object.values(parsed)); }
                });
                return all;
            },
            recordCorrect(wrongItem) {
                this.STORAGE_KEYS.forEach(key => {
                    const data = localStorage.getItem(key);
                    if (data) {
                        const all = JSON.parse(data);
                        const itemKey = JSON.stringify({q: wrongItem.q || wrongItem.cn || wrongItem.en, type: wrongItem.type});
                        if (all[itemKey]) {
                            all[itemKey].correctCount++;
                            if (all[itemKey].correctCount >= 5) { delete all[itemKey]; }
                            localStorage.setItem(key, JSON.stringify(all));
                        }
                    }
                });
            }
        };

        const allData = {
            lesson1: {
                vocab: [
                    {en: 'teacher', cn: '老师'}, {en: 'student', cn: '学生'}, {en: 'friend', cn: '朋友'},
                    {en: 'boss', cn: '老板'}, {en: 'colleague', cn: '同事'}, {en: 'roommate', cn: '室友'},
                    {en: 'busy', cn: '忙碌的'}, {en: 'late', cn: '迟到的'}, {en: 'early', cn: '早的'},
                    {en: 'tired', cn: '累的'}, {en: 'bad', cn: '坏的'}, {en: 'good', cn: '好的'},
                    {en: 'cold', cn: '冷的'}, {en: 'hot', cn: '热的'}
                ],
                fillBlank: [
                    {q: 'I ___ happy.', a: 'am', hint: '第一人称用 am'}, {q: 'She ___ tired.', a: 'is', hint: '第三人称单数用 is'},
                    {q: 'They ___ good students.', a: 'are', hint: '复数用 are'}, {q: '___ I late?', a: 'Am', hint: '第一人称疑问用 Am'},
                    {q: '___ you cold?', a: 'Are', hint: 'you 疑问用 Are'}, {q: '___ she your friend?', a: 'Is', hint: '第三人称疑问用 Is'}
                ],
                translate: [
                    {cn: '我很忙，也很累。', en: 'I am busy and tired.'}, {cn: '你冷吗？', en: 'Are you cold?'},
                    {cn: '不，我很热。', en: 'No, I am hot.'}, {cn: '我们是学生，你是老师。', en: 'We are students, you are a teacher.'}
                ]
            },
            lesson2: {
                vocab: [
                    {en: 'live in apartment', cn: '住在公寓'}, {en: 'have children', cn: '有孩子'},
                    {en: 'watch TV', cn: '看电视'}, {en: 'listen to music', cn: '听音乐'},
                    {en: 'eat fast food', cn: '吃快餐'}, {en: 'drink coffee', cn: '喝咖啡'},
                    {en: 'speak English', cn: '说英语'}, {en: 'work in a bank', cn: '在银行工作'}
                ],
                fillBlank: [
                    {q: 'I ___ two brothers.', a: 'have', hint: '第一人称用 have'}, {q: 'My wife ___ a car.', a: 'has', hint: '第三人称单数用 has'},
                    {q: '___ you live here?', a: 'Do', hint: '疑问句用 Do'}, {q: '___ she work in a bank?', a: 'Does', hint: '第三人称疑问用 Does'}
                ],
                translate: [
                    {cn: '你住在这里附近吗？', en: 'Do you live near here?'}, {cn: '你喜欢什么颜色？', en: 'What color do you like?'},
                    {cn: '他们说西班牙语吗？', en: 'Do they speak Spanish?'}, {cn: '我听流行音乐。', en: 'I listen to pop music.'}
                ]
            },
            lesson3: {
                vocab: [
                    {en: 'cinema', cn: '电影院'}, {en: 'beach', cn: '海滩'}, {en: 'play tennis', cn: '打网球'},
                    {en: 'swim', cn: '游泳'}, {en: 'restaurant', cn: '餐厅'}, {en: 'drive', cn: '开车'}
                ],
                fillBlank: [
                    {q: 'I ___ drive a car.', a: 'can', hint: '表达能力用 can'}, {q: '___ you help me?', a: 'Can', hint: '请求帮助用 Can'},
                    {q: '___ I sit here?', a: 'Can', hint: '请求许可用 Can'}, {q: 'No, you ___.', a: 'cannot', hint: '否定回答'}
                ],
                translate: [
                    {cn: '你不可以在医院用手机。', en: 'You cannot use mobile phone in hospital.'},
                    {cn: '你可以跟我一起去电影院吗？', en: 'Can you go to the cinema with me?'}, {cn: '我不确定。', en: 'I am not sure.'}
                ]
            }
        };

        function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }
        let currentMode = '', currentQuestions = [], currentIndex = 0, wrongAttempts = 0, score = 0, dictationMode = 'cn2en';

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            if (mode === 'dictation') showDictationStart();
            if (mode === 'fillblank') startFillBlank();
            if (mode === 'translate') startTranslate();
        }
        function showDictationStart() {
            document.getElementById('quiz-area').innerHTML = 
                '<div class="mode-toggle"><button class="active" onclick="setDictationMode(' + "'cn2en'" + ')">中译英</button>' +
                '<button onclick="setDictationMode(' + "'en2cn'" + ')">英译中</button></div>' +
                '<div style="text-align:center;padding:40px;"><h2>单词默写</h2><p style="color:#666;margin:20px 0;">选择模式后自动开始</p></div>';
            setTimeout(startDictation, 100);
        }
        function setDictationMode(mode) {
            dictationMode = mode;
            document.querySelectorAll('.mode-toggle button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            startDictation();
        }
        function startDictation() {
            const allVocab = [
                ...allData.lesson1.vocab.map(v => ({...v, lesson: 'L1'})),
                ...allData.lesson2.vocab.map(v => ({...v, lesson: 'L2'})),
                ...allData.lesson3.vocab.map(v => ({...v, lesson: 'L3'}))
            ];
            currentQuestions = shuffle(allVocab).slice(0, 10);
            currentIndex = 0; score = 0;
            showDictationQuestion();
        }
        function showDictationQuestion() {
            if (currentIndex >= currentQuestions.length) { showCompletion(score, currentQuestions.length); return; }
            wrongAttempts = 0;
            const q = currentQuestions[currentIndex];
            const prompt = dictationMode === 'cn2en' ? q.cn : q.en;
            const answer = dictationMode === 'cn2en' ? q.en : q.cn;
            document.getElementById('quiz-area').innerHTML = 
                '<div class="quiz-progress">题目 ' + (currentIndex + 1) + ' / ' + currentQuestions.length + '</div>' +
                '<div class="quiz-question">' + (dictationMode === 'cn2en' ? '请输入英文：' : '请输入中文：') + '<br><br><strong>' + prompt + '</strong><span class="lesson-tag">' + q.lesson + '</span></div>' +
                '<input type="text" class="quiz-input" id="answer-input" placeholder="请输入答案">' +
                '<br><button class="quiz-btn" onclick="checkDictationAnswer()">提交答案</button>' +
                '<div id="hint-btn-container"></div><div class="quiz-feedback" id="feedback"></div>';
            document.getElementById('answer-input').onkeypress = function(e) { if(e.key==='Enter') checkDictationAnswer(); };
            setTimeout(() => document.getElementById('answer-input').focus(), 100);
        }
        function checkDictationAnswer() {
            const input = document.getElementById('answer-input'), feedback = document.getElementById('feedback');
            const q = currentQuestions[currentIndex];
            const correctAnswer = dictationMode === 'cn2en' ? q.en : q.cn;
            const userAnswer = input.value.trim();
            if (!userAnswer) return;
            if (userAnswer.toLowerCase() === correctAnswer.toLowerCase()) {
                score++;
                input.className = 'quiz-input correct'; input.disabled = true;
                feedback.className = 'quiz-feedback show correct'; feedback.textContent = '✅ 回答正确！';
                setTimeout(() => { currentIndex++; showDictationQuestion(); }, 1200);
            } else {
                wrongAttempts++;
                input.className = 'quiz-input wrong';
                feedback.className = 'quiz-feedback show wrong';
                feedback.textContent = '❌ 回答错误（第' + wrongAttempts + '次尝试）';
                input.value = ''; input.focus();
                if (wrongAttempts >= 3) document.getElementById('hint-btn-container').innerHTML = '<button class="quiz-btn hint-btn" onclick="showAnswer(' + "'" + correctAnswer.replace(/'/g, "\\'") + "'" + ')">💡 显示答案</button>';
            }
        }
        function startFillBlank() {
            const allQ = [
                ...allData.lesson1.fillBlank.map(q => ({...q, lesson: 'L1'})),
                ...allData.lesson2.fillBlank.map(q => ({...q, lesson: 'L2'})),
                ...allData.lesson3.fillBlank.map(q => ({...q, lesson: 'L3'}))
            ];
            currentQuestions = shuffle(allQ).slice(0, 10);
            currentIndex = 0; score = 0;
            showFillBlankQuestion();
        }
        function showFillBlankQuestion() {
            if (currentIndex >= currentQuestions.length) { showCompletion(score, currentQuestions.length); return; }
            wrongAttempts = 0;
            const q = currentQuestions[currentIndex];
            document.getElementById('quiz-area').innerHTML = 
                '<div class="quiz-progress">题目 ' + (currentIndex + 1) + ' / ' + currentQuestions.length + '</div>' +
                '<div class="quiz-question">' + q.q.replace('___', '_____') + '<span class="lesson-tag">' + q.lesson + '</span></div>' +
                '<div class="hint-text" id="hint-text">💡 提示：' + q.hint + '</div>' +
                '<input type="text" class="quiz-input" id="answer-input" placeholder="填入正确答案">' +
                '<br><button class="quiz-btn" onclick="checkFillBlankAnswer()">提交答案</button>' +
                '<div id="hint-btn-container"></div><div class="quiz-feedback" id="feedback"></div>';
            document.getElementById('answer-input').onkeypress = function(e) { if(e.key==='Enter') checkFillBlankAnswer(); };
            setTimeout(() => document.getElementById('answer-input').focus(), 100);
        }
        function checkFillBlankAnswer() {
            const input = document.getElementById('answer-input'), feedback = document.getElementById('feedback'), hintText = document.getElementById('hint-text');
            const q = currentQuestions[currentIndex];
            const userAnswer = input.value.trim().toLowerCase();
            if (!userAnswer) return;
            const isCorrect = userAnswer === q.a.toLowerCase() || (q.a === 'cannot' && (userAnswer === "can't" || userAnswer === 'can not'));
            if (isCorrect) {
                score++;
                input.className = 'quiz-input correct'; input.disabled = true;
                feedback.className = 'quiz-feedback show correct'; feedback.textContent = '✅ 回答正确！';
                setTimeout(() => { currentIndex++; showFillBlankQuestion(); }, 1200);
            } else {
                wrongAttempts++;
                input.className = 'quiz-input wrong';
                feedback.className = 'quiz-feedback show wrong';
                feedback.textContent = '❌ 回答错误（第' + wrongAttempts + '次尝试）';
                hintText.classList.add('show');
                input.value = ''; input.focus();
                if (wrongAttempts >= 3) document.getElementById('hint-btn-container').innerHTML = '<button class="quiz-btn hint-btn" onclick="showAnswer(' + "'" + q.a + "'" + ')">💡 显示答案</button>';
            }
        }
        function startTranslate() {
            const allQ = [
                ...allData.lesson1.translate.map(q => ({...q, lesson: 'L1'})),
                ...allData.lesson2.translate.map(q => ({...q, lesson: 'L2'})),
                ...allData.lesson3.translate.map(q => ({...q, lesson: 'L3'}))
            ];
            currentQuestions = shuffle(allQ).slice(0, 10);
            currentIndex = 0; score = 0;
            showTranslateQuestion();
        }
        function showTranslateQuestion() {
            if (currentIndex >= currentQuestions.length) { showCompletion(score, currentQuestions.length); return; }
            wrongAttempts = 0;
            const q = currentQuestions[currentIndex];
            document.getElementById('quiz-area').innerHTML = 
                '<div class="quiz-progress">题目 ' + (currentIndex + 1) + ' / ' + currentQuestions.length + '</div>' +
                '<div class="quiz-question">请将以下中文翻译成英文：<br><br><strong>"' + q.cn + '"</strong><span class="lesson-tag">' + q.lesson + '</span></div>' +
                '<textarea class="quiz-input" id="answer-input" rows="3" placeholder="请输入英文翻译"></textarea>' +
                '<br><button class="quiz-btn" onclick="checkTranslateAnswer()">提交答案</button>' +
                '<div id="hint-btn-container"></div><div class="quiz-feedback" id="feedback"></div>';
            setTimeout(() => document.getElementById('answer-input').focus(), 100);
        }
        function checkTranslateAnswer() {
            const input = document.getElementById('answer-input'), feedback = document.getElementById('feedback');
            const q = currentQuestions[currentIndex];
            const userAnswer = input.value.trim().toLowerCase().replace(/[^a-z\s]/g, '');
            const correctAnswer = q.en.toLowerCase().replace(/[^a-z\s]/g, '');
            if (!userAnswer) return;
            if (userAnswer === correctAnswer) {
                score++;
                input.className = 'quiz-input correct'; input.disabled = true;
                feedback.className = 'quiz-feedback show correct'; feedback.textContent = '✅ 回答正确！';
                setTimeout(() => { currentIndex++; showTranslateQuestion(); }, 1200);
            } else {
                wrongAttempts++;
                input.className = 'quiz-input wrong';
                feedback.className = 'quiz-feedback show wrong';
                feedback.textContent = '❌ 回答错误（第' + wrongAttempts + '次尝试）';
                if (wrongAttempts >= 3) document.getElementById('hint-btn-container').innerHTML = '<button class="quiz-btn hint-btn" onclick="showAnswer(' + "'" + q.en + "'" + ')">💡 显示答案</button>';
            }
        }
        function showAnswer(answer) {
            document.getElementById('feedback').innerHTML = '<div class="answer-display">正确答案：' + answer + '</div>';
            document.getElementById('feedback').className = 'quiz-feedback show';
            setTimeout(() => { currentIndex++; 
                if (currentMode === 'dictation') showDictationQuestion();
                else if (currentMode === 'fillblank') showFillBlankQuestion();
                else if (currentMode === 'translate') showTranslateQuestion();
            }, 5000);
        }
        function showCompletion(score, total) {
            const percentage = Math.round(score / total * 100);
            let stars = '⭐';
            if (percentage >= 60) stars = '⭐⭐';
            if (percentage >= 80) stars = '⭐⭐⭐';
            if (percentage === 100) stars = '🏆⭐⭐⭐🏆';
            document.getElementById('quiz-area').innerHTML = '<div class="completion-message"><h2>🎉 练习完成！</h2><div class="stars">' + stars + '</div><p style="font-size:1.3em;">得分：' + score + ' / ' + total + ' (' + percentage + '%)</p><button class="quiz-btn" onclick="location.reload()">再来一次</button></div>';
        }
    </script>
</body>
</html>
