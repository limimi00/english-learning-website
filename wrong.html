<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>错题练习 - 英语学习</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%); 
            min-height: 100vh; 
            padding: 10px;
        }
        .container { 
            max-width: 800px; 
            margin: 0 auto; 
            background: white; 
            border-radius: 16px; 
            padding: 25px 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
            flex-wrap: wrap;
            gap: 10px;
        }
        h1 { 
            color: #333; 
            font-size: clamp(1.3rem, 5vw, 1.8rem);
        }
        .back-btn { 
            background: #ff6b6b; 
            color: white; 
            padding: 10px 18px;
            border-radius: 8px; 
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .stats { 
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .stat-card { 
            background: #f8f9fa; 
            padding: 15px 10px;
            border-radius: 10px; 
            text-align: center; 
        }
        .stat-card .number { 
            font-size: 1.8rem;
            font-weight: bold; 
            color: #ff6b6b; 
        }
        .stat-card .label { 
            color: #666; 
            font-size: 0.8rem;
            margin-top: 5px;
        }
        .mode-selector { 
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }
        .mode-btn { 
            padding: 12px 8px;
            background: #f0f0f0; 
            border: 2px solid transparent;
            border-radius: 10px; 
            cursor: pointer; 
            text-align: center;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .mode-btn.active { 
            background: #ff6b6b; 
            color: white; 
        }
        .quiz-container { 
            background: #f8f9fa; 
            padding: 25px 15px;
            border-radius: 12px;
            min-height: 300px;
            text-align: center;
        }
        .quiz-progress { 
            margin-bottom: 15px; 
            color: #ff6b6b; 
            font-size: 1rem;
            font-weight: 500;
        }
        .quiz-question { 
            font-size: clamp(1.1rem, 4.5vw, 1.5rem);
            margin: 20px 0; 
            color: #333;
            line-height: 1.5;
            word-break: break-word;
        }
        .quiz-input { 
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd; 
            border-radius: 10px; 
            font-size: 1.1rem;
            text-align: center; 
            margin: 15px 0;
            -webkit-appearance: none;
        }
        .quiz-input.correct { border-color: #28a745; background: #d4edda; }
        .quiz-input.wrong { border-color: #dc3545; background: #f8d7da; }
        .quiz-btn { 
            background: #ff6b6b; 
            color: white; 
            border: none; 
            padding: 14px 35px;
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 1.05rem;
            margin: 8px 5px;
            font-weight: 500;
            min-width: 120px;
        }
        .quiz-btn:active { transform: scale(0.96); }
        .quiz-btn.hint-btn { background: #ffc107; color: #333; }
        .quiz-btn.clear-btn { background: #6c757d; }
        .quiz-feedback { 
            margin-top: 15px; 
            padding: 12px;
            border-radius: 8px; 
            font-size: 1rem;
            display: none; 
        }
        .quiz-feedback.show { display: block; }
        .quiz-feedback.correct { background: #d4edda; color: #155724; }
        .quiz-feedback.wrong { background: #f8d7da; color: #721c24; }
        .quiz-feedback.hint { background: #fff3cd; color: #856404; }
        .lesson-tag { 
            display: inline-block; 
            background: #ff6b6b; 
            color: white; 
            padding: 4px 10px;
            border-radius: 4px; 
            font-size: 0.75rem;
            margin-left: 8px;
        }
        .progress-tag { 
            display: inline-block; 
            background: #28a745; 
            color: white; 
            padding: 4px 10px;
            border-radius: 4px; 
            font-size: 0.75rem;
            margin-left: 8px;
        }
        .completion-message { text-align: center; padding: 30px 15px; }
        .completion-message h2 { 
            color: #28a745; 
            margin-bottom: 15px;
            font-size: 1.5rem;
        }
        .empty-message { text-align: center; padding: 40px 20px; }
        .empty-message h2 { 
            color: #28a745; 
            margin-bottom: 15px;
            font-size: 1.5rem;
        }
        .stars { font-size: 2.5rem; margin: 15px 0; }
        .answer-display { 
            font-size: 1.2rem;
            color: #ff6b6b; 
            font-weight: bold; 
            margin: 12px 0; 
            padding: 15px;
            background: #ffe0e0; 
            border-radius: 8px;
            word-break: break-word;
        }
        .hint-text { color: #888; font-size: 0.9rem; margin: 10px 0; display: none; }
        .hint-text.show { display: block; }

        @media (min-width: 600px) {
            .mode-selector { grid-template-columns: repeat(4, 1fr); }
        }
        @media (min-width: 768px) {
            body { padding: 20px; }
            .container { padding: 40px; border-radius: 20px; }
            .stats { display: flex; gap: 20px; }
            .stat-card { flex: 1; padding: 20px 15px; }
            .stat-card .number { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 错题练习</h1>
            <a href="index.html" class="back-btn">← 返回</a>
        </div>
        
        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="number" id="total-wrong">0</div>
                <div class="label">错题总数</div>
            </div>
            <div class="stat-card">
                <div class="number" id="mastered">0</div>
                <div class="label">已掌握</div>
            </div>
            <div class="stat-card">
                <div class="number" id="remaining">0</div>
                <div class="label">待练习</div>
            </div>
        </div>
        
        <div class="mode-selector" id="mode-selector" style="display:none;">
            <button class="mode-btn" onclick="setMode('dictation')">单词默写</button>
            <button class="mode-btn" onclick="setMode('fillblank')">填空练习</button>
            <button class="mode-btn" onclick="setMode('translate')">翻译练习</button>
            <button class="mode-btn" onclick="setMode('all')">全部错题</button>
        </div>
        
        <div class="quiz-container" id="quiz-area">
            <div class="empty-message">
                <h2>🎉 太棒了！</h2>
                <p style="color:#666;margin:15px 0;">你目前还没有错题</p>
                <p style="color:#999;font-size:0.9rem;">继续加油，保持好习惯！</p>
                <button class="quiz-btn clear-btn" onclick="clearAllWrong()" style="margin-top:20px;">清除所有记录</button>
            </div>
        </div>
    </div>
    <script>
        // 错题管理器
        const WrongAnswersManager = {
            STORAGE_KEYS: ['english_learning_wrong_answers_l1', 'english_learning_wrong_answers_l2', 'english_learning_wrong_answers_l3', 'english_learning_wrong_answers_l4', 'english_learning_wrong_answers_l5'],
            
            getAllWrong() {
                let all = [];
                this.STORAGE_KEYS.forEach((key, index) => {
                    const data = localStorage.getItem(key);
                    if (data) {
                        const parsed = JSON.parse(data);
                        Object.entries(parsed).forEach(([k, v]) => {
                            all.push({...v, key: k, storageKey: key, lessonNum: index + 1});
                        });
                    }
                });
                return all;
            },
            
            recordCorrect(wrongItem) {
                const all = this.getAllWrong();
                const item = all.find(i => i.key === wrongItem.key);
                if (item) {
                    const storageData = JSON.parse(localStorage.getItem(item.storageKey) || '{}');
                    if (storageData[item.key]) {
                        storageData[item.key].correctCount++;
                        if (storageData[item.key].correctCount >= 5) {
                            delete storageData[item.key];
                        }
                        localStorage.setItem(item.storageKey, JSON.stringify(storageData));
                    }
                }
            },
            
            clearAll() {
                this.STORAGE_KEYS.forEach(key => localStorage.removeItem(key));
            },
            
            getStats() {
                const all = this.getAllWrong();
                const mastered = all.filter(item => item.correctCount > 0).length;
                return { total: all.length, mastered: mastered, remaining: all.length };
            }
        };

        let currentMode = '', currentQuestions = [], currentIndex = 0, wrongAttempts = 0, score = 0;

        function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

        function init() {
            const stats = WrongAnswersManager.getStats();
            document.getElementById('total-wrong').textContent = stats.total;
            document.getElementById('mastered').textContent = stats.mastered;
            document.getElementById('remaining').textContent = stats.remaining;
            
            if (stats.total > 0) {
                document.getElementById('mode-selector').style.display = 'grid';
                document.getElementById('quiz-area').innerHTML = 
                    '<div style="text-align:center;padding:40px 20px;">' +
                    '<h3>选择练习模式</h3>' +
                    '<p style="color:#666;margin:15px 0;">从上方选择错题类型开始练习</p>' +
                    '</div>';
            }
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            startPractice();
        }

        function startPractice() {
            let allWrong = WrongAnswersManager.getAllWrong();
            if (currentMode !== 'all') {
                allWrong = allWrong.filter(item => item.type === currentMode);
            }
            if (allWrong.length === 0) {
                document.getElementById('quiz-area').innerHTML = 
                    '<div class="completion-message">' +
                    '<h2>🎉 该类型没有错題！</h2>' +
                    '<p style="color:#666;margin:15px 0;">继续保持！</p>' +
                    '<button class="quiz-btn" onclick="location.reload()" style="margin-top:20px;">返回</button>' +
                    '</div>';
                return;
            }
            currentQuestions = shuffle(allWrong);
            currentIndex = 0; score = 0;
            showQuestion();
        }

        function showQuestion() {
            if (currentIndex >= currentQuestions.length) { 
                showCompletion(); 
                return; 
            }
            wrongAttempts = 0;
            const q = currentQuestions[currentIndex];
            
            if (q.type === 'dictation') {
                showDictationQuestion(q);
            } else if (q.type === 'fillblank') {
                showFillBlankQuestion(q);
            } else if (q.type === 'translate') {
                showTranslateQuestion(q);
            } else {
                // 默认按 dictation 处理
                showDictationQuestion(q);
            }
        }

        function showDictationQuestion(q) {
            const prompt = q.q || q.cn || '未知题目';
            const answer = q.a || q.en || '';
            const progressTag = q.correctCount > 0 ? '<span class="progress-tag">已正确' + q.correctCount + '/5次</span>' : '';
            
            document.getElementById('quiz-area').innerHTML = 
                '<div class="quiz-progress">题目 ' + (currentIndex + 1) + ' / ' + currentQuestions.length + '</div>' +
                '<div class="quiz-question">请输入英文：<br><br><strong>' + prompt + '</strong><span class="lesson-tag">' + (q.lesson || 'L' + q.lessonNum) + '</span>' + progressTag + '</div>' +
                '<input type="text" class="quiz-input" id="answer-input" placeholder="请输入答案">' +
                '<br><button class="quiz-btn" onclick="checkDictationAnswer()">提交答案</button>' +
                '<div id="hint-btn-container"></div><div class="quiz-feedback" id="feedback"></div>';
            
            document.getElementById('answer-input').onkeypress = function(e) { if(e.key==='Enter') checkDictationAnswer(); };
            setTimeout(() => document.getElementById('answer-input').focus(), 100);
        }

        function checkDictationAnswer() {
            const input = document.getElementById('answer-input'), feedback = document.getElementById('feedback');
            const q = currentQuestions[currentIndex];
            const correctAnswer = q.a || q.en || '';
            const userAnswer = input.value.trim();
            if (!userAnswer) return;
            
            if (userAnswer.toLowerCase() === correctAnswer.toLowerCase()) {
                score++;
                WrongAnswersManager.recordCorrect(q);
                input.className = 'quiz-input correct'; input.disabled = true;
                feedback.className = 'quiz-feedback show correct';
                feedback.textContent = '✅ 回答正确！（已连续正确' + ((q.correctCount || 0) + 1) + '次，5次后将从错题本移除）';
                setTimeout(() => { currentIndex++; showQuestion(); }, 1500);
            } else {
                wrongAttempts++;
                input.className = 'quiz-input wrong';
                feedback.className = 'quiz-feedback show wrong';
                feedback.textContent = '❌ 回答错误（第' + wrongAttempts + '次尝试）';
                input.value = ''; input.focus();
                if (wrongAttempts >= 3) {
                    document.getElementById('hint-btn-container').innerHTML = 
                        '<button class="quiz-btn hint-btn" onclick="showAnswer(' + "'" + correctAnswer.replace(/'/g, "\\'") + "'" + ')">💡 显示答案</button>';
                }
            }
        }

        function showFillBlankQuestion(q) {
            const questionText = q.q || '未知题目';
            const progressTag = q.correctCount > 0 ? '<span class="progress-tag">已正确' + q.correctCount + '/5次</span>' : '';
            
            document.getElementById('quiz-area').innerHTML = 
                '<div class="quiz-progress">题目 ' + (currentIndex + 1) + ' / ' + currentQuestions.length + '</div>' +
                '<div class="quiz-question">' + questionText.replace('___', '_____') + '<span class="lesson-tag">' + (q.lesson || 'L' + q.lessonNum) + '</span>' + progressTag + '</div>' +
                '<div class="hint-text" id="hint-text">💡 提示：' + (q.hint || '') + '</div>' +
                '<input type="text" class="quiz-input" id="answer-input" placeholder="填入正确答案">' +
                '<br><button class="quiz-btn" onclick="checkFillBlankAnswer()">提交答案</button>' +
                '<div id="hint-btn-container"></div><div class="quiz-feedback" id="feedback"></div>';
            
            document.getElementById('answer-input').onkeypress = function(e) { if(e.key==='Enter') checkFillBlankAnswer(); };
            setTimeout(() => document.getElementById('answer-input').focus(), 100);
        }

        function checkFillBlankAnswer() {
            const input = document.getElementById('answer-input'), feedback = document.getElementById('feedback'), hintText = document.getElementById('hint-text');
            const q = currentQuestions[currentIndex];
            const userAnswer = input.value.trim().toLowerCase();
            if (!userAnswer) return;
            
            const correctAnswer = (q.a || '').toLowerCase();
            if (userAnswer === correctAnswer) {
                score++;
                WrongAnswersManager.recordCorrect(q);
                input.className = 'quiz-input correct'; input.disabled = true;
                feedback.className = 'quiz-feedback show correct';
                feedback.textContent = '✅ 回答正确！（已连续正确' + ((q.correctCount || 0) + 1) + '次）';
                setTimeout(() => { currentIndex++; showQuestion(); }, 1500);
            } else {
                wrongAttempts++;
                input.className = 'quiz-input wrong';
                feedback.className = 'quiz-feedback show wrong';
                feedback.textContent = '❌ 回答错误（第' + wrongAttempts + '次尝试）';
                hintText.classList.add('show');
                input.value = ''; input.focus();
                if (wrongAttempts >= 3) {
                    document.getElementById('hint-btn-container').innerHTML = 
                        '<button class="quiz-btn hint-btn" onclick="showFillBlankAnswer()">💡 显示答案</button>';
                }
            }
        }

        function showFillBlankAnswer() {
            const q = currentQuestions[currentIndex];
            document.getElementById('feedback').innerHTML = '<div class="answer-display">正确答案：' + (q.a || '') + '</div>';
            document.getElementById('feedback').className = 'quiz-feedback show hint';
            setTimeout(() => { currentIndex++; showQuestion(); }, 5000);
        }

        function showTranslateQuestion(q) {
            const progressTag = q.correctCount > 0 ? '<span class="progress-tag">已正确' + q.correctCount + '/5次</span>' : '';
            
            document.getElementById('quiz-area').innerHTML = 
                '<div class="quiz-progress">题目 ' + (currentIndex + 1) + ' / ' + currentQuestions.length + '</div>' +
                '<div class="quiz-question">请将以下中文翻译成英文：<br><br><strong style="font-size:1.3em;">"' + (q.cn || q.q || '未知') + '"</strong><span class="lesson-tag">' + (q.lesson || 'L' + q.lessonNum) + '</span>' + progressTag + '</div>' +
                '<textarea class="quiz-input" id="answer-input" rows="3" placeholder="请输入英文翻译"></textarea>' +
                '<br><button class="quiz-btn" onclick="checkTranslateAnswer()">提交答案</button>' +
                '<div id="hint-btn-container"></div><div class="quiz-feedback" id="feedback"></div>';
            
            setTimeout(() => document.getElementById('answer-input').focus(), 100);
        }

        function checkTranslateAnswer() {
            const input = document.getElementById('answer-input'), feedback = document.getElementById('feedback');
            const q = currentQuestions[currentIndex];
            const userAnswer = input.value.trim().toLowerCase().replace(/[^a-z\\s]/g, '');
            const correctAnswer = (q.en || '').toLowerCase().replace(/[^a-z\\s]/g, '');
            if (!userAnswer) return;
            
            if (userAnswer === correctAnswer) {
                score++;
                WrongAnswersManager.recordCorrect(q);
                input.className = 'quiz-input correct'; input.disabled = true;
                feedback.className = 'quiz-feedback show correct';
                feedback.textContent = '✅ 回答正确！（已连续正确' + ((q.correctCount || 0) + 1) + '次）';
                setTimeout(() => { currentIndex++; showQuestion(); }, 1500);
            } else {
                wrongAttempts++;
                input.className = 'quiz-input wrong';
                feedback.className = 'quiz-feedback show wrong';
                feedback.textContent = '❌ 回答错误（第' + wrongAttempts + '次尝试）';
                if (wrongAttempts >= 3) {
                    document.getElementById('hint-btn-container').innerHTML = 
                        '<button class="quiz-btn hint-btn" onclick="showTranslateAnswer()">💡 显示答案</button>';
                }
            }
        }

        function showTranslateAnswer() {
            const q = currentQuestions[currentIndex];
            document.getElementById('feedback').innerHTML = '<div class="answer-display">参考答案：' + (q.en || '') + '</div>';
            document.getElementById('feedback').className = 'quiz-feedback show hint';
            setTimeout(() => { currentIndex++; showQuestion(); }, 5000);
        }

        function showAnswer(answer) {
            document.getElementById('feedback').innerHTML = '<div class="answer-display">正确答案：' + answer + '</div>';
            document.getElementById('feedback').className = 'quiz-feedback show hint';
            setTimeout(() => { currentIndex++; showQuestion(); }, 5000);
        }

        function showCompletion() {
            document.getElementById('quiz-area').innerHTML = 
                '<div class="completion-message">' +
                '<h2>🎉 错题练习完成！</h2>' +
                '<p style="font-size:1.2em;color:#333;margin:15px 0;">本次答对：' + score + ' / ' + currentQuestions.length + '</p>' +
                '<p style="color:#666;">每道题连续答对5次后将自动从错题本移除</p>' +
                '<button class="quiz-btn" onclick="location.reload()" style="margin-top:20px;">继续练习</button>' +
                '</div>';
            init();
        }

        function clearAllWrong() {
            if (confirm('确定要清除所有错题记录吗？')) {
                WrongAnswersManager.clearAll();
                location.reload();
            }
        }

        init();
    </script>
</body>
</html>
